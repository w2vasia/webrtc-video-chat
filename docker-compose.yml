version: '3.8'
services:
  app:
    build: .
    container_name: whisper
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_MAILTO=${VAPID_MAILTO}
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
